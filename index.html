<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inspeção de Extintores</title>
<meta name="theme-color" content="#12161b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Extintores">
<meta name="description" content="Inspeção e controle de extintores com QR Code, checklist e relatório em PDF">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#12161b;
  --panel:#1b2128;
  --panel-2:#232b33;
  --border:#333d47;
  --border-soft:#2a323b;
  --text:#e9edf1;
  --muted:#8b96a3;
  --muted-2:#5f6a76;
  --accent:#e0432a;
  --accent-dark:#a8301e;
  --accent-glow:rgba(224,67,42,0.18);
  --success:#3aa66b;
  --success-bg:rgba(58,166,107,0.14);
  --warning:#d9a441;
  --warning-bg:rgba(217,164,65,0.14);
  --danger:#e0432a;
  --danger-bg:rgba(224,67,42,0.14);
  --radius:10px;
  --font-display:'Oswald',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-body);height:100%;}
body{-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

/* ===== layout shell ===== */
#app{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;padding:20px 14px;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px 8px;border-bottom:1px solid var(--border-soft);margin-bottom:16px;}
.brand-logo{width:36px;height:36px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.brand-logo img{width:100%;height:100%;object-fit:cover;}
.brand-logo svg{width:20px;height:20px;}
.brand-text{line-height:1.15;overflow:hidden;}
.brand-text b{font-family:var(--font-display);font-size:15px;letter-spacing:.3px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.brand-text span{font-size:11px;color:var(--muted);}

.nav{display:flex;flex-direction:column;gap:2px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--muted);
  background:none;border:none;text-align:left;font-size:13.5px;font-weight:500;transition:.15s;
}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.8;}
.nav-item:hover{background:var(--panel-2);color:var(--text);}
.nav-item.active{background:var(--accent-glow);color:var(--accent);}
.nav-item.active svg{opacity:1;}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--muted-2);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-bottom:1px solid var(--border-soft);
  position:sticky;top:0;background:rgba(18,22,27,0.85);backdrop-filter:blur(6px);z-index:20;
}
.topbar h1{font-family:var(--font-display);font-size:20px;font-weight:600;margin:0;letter-spacing:.2px;}
.topbar .sub{font-size:12px;color:var(--muted);margin-top:2px;}
.content{padding:22px 26px 90px 26px;flex:1;}

/* mobile bottom nav */
.bottom-nav{display:none;}

/* ===== buttons ===== */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:8px;border:1px solid var(--border);
  background:var(--panel-2);color:var(--text);font-size:13px;font-weight:600;white-space:nowrap;
}
.btn svg{width:15px;height:15px;}
.btn:hover{border-color:var(--muted-2);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-accent:hover{background:var(--accent-dark);border-color:var(--accent-dark);}
.btn-ghost{background:none;border-color:transparent;}
.btn-ghost:hover{background:var(--panel-2);}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-danger{color:var(--danger);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ===== cards / grid ===== */
.grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-2{grid-template-columns:1fr 1fr;}
@media(max-width:1000px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}}

.card{background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--radius);padding:18px;}
.stat-card{position:relative;overflow:hidden;}
.stat-card .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.stat-card .value{font-family:var(--font-display);font-size:32px;margin-top:6px;font-weight:600;}
.stat-card .bar{height:3px;border-radius:2px;background:var(--border);margin-top:12px;overflow:hidden;}
.stat-card .bar i{display:block;height:100%;border-radius:2px;}

.section-title{font-family:var(--font-display);font-size:16px;font-weight:600;margin:26px 0 12px 0;letter-spacing:.2px;display:flex;align-items:center;gap:8px;}
.section-title:first-child{margin-top:0;}

/* ===== status chips ===== */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.chip::before{content:'';width:6px;height:6px;border-radius:50%;}
.chip.ok{background:var(--success-bg);color:var(--success);}
.chip.ok::before{background:var(--success);}
.chip.warn{background:var(--warning-bg);color:var(--warning);}
.chip.warn::before{background:var(--warning);}
.chip.bad{background:var(--danger-bg);color:var(--danger);}
.chip.bad::before{background:var(--danger);}
.chip.neutral{background:var(--panel-2);color:var(--muted);}
.chip.neutral::before{background:var(--muted-2);}

/* ===== operational status badges ===== */
.status-op{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:8px 10px;border-radius:8px;
  font-size:11.5px;font-weight:800;letter-spacing:.25px;
  text-transform:uppercase;margin-top:4px;border:1px solid transparent;
}
.status-op::before{content:'';width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-op.em-campo{background:rgba(58,166,107,.16);color:#4dcc83;border-color:rgba(58,166,107,.35);}
.status-op.em-campo::before{background:#3aa66b;}
.status-op.estoque{background:rgba(79,124,255,.16);color:#6f96ff;border-color:rgba(79,124,255,.35);}
.status-op.estoque::before{background:#4f7cff;}
.status-op.recarga{background:rgba(217,164,65,.16);color:#f0b84f;border-color:rgba(217,164,65,.35);}
.status-op.recarga::before{background:#d9a441;}
.status-op.desativado{background:rgba(224,67,42,.16);color:#ff664f;border-color:rgba(224,67,42,.35);}
.status-op.desativado::before{background:#e0432a;}
.ext-card.status-em-campo{border-left:4px solid #3aa66b;}
.ext-card.status-estoque{border-left:4px solid #4f7cff;}
.ext-card.status-recarga{border-left:4px solid #d9a441;}
.ext-card.status-desativado{border-left:4px solid #e0432a;}

/* ===== donut chart ===== */
.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
.donut{width:130px;height:130px;border-radius:50%;flex-shrink:0;position:relative;}
.donut .hole{position:absolute;inset:16px;background:var(--panel);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;}
.donut .hole b{font-family:var(--font-display);font-size:22px;}
.donut .hole span{font-size:10px;color:var(--muted);}
.legend{display:flex;flex-direction:column;gap:8px;font-size:12.5px;}
.legend-item{display:flex;align-items:center;gap:8px;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* ===== extinguisher cards ===== */
.ext-grid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));}
.ext-card{background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:.15s;}
.ext-card:hover{border-color:var(--muted-2);}
.ext-photo{height:130px;background:var(--panel-2);position:relative;overflow:hidden;}
.ext-photo img{width:100%;height:100%;object-fit:cover;}
.ext-photo .no-photo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted-2);}
.ext-photo .no-photo svg{width:34px;height:34px;}
.ext-num{position:absolute;top:8px;left:8px;background:rgba(18,22,27,0.85);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;padding:2px 7px;border-radius:5px;}
.ext-body{padding:12px 13px 13px 13px;display:flex;flex-direction:column;gap:6px;flex:1;}
.ext-body .loc{font-size:13.5px;font-weight:600;}
.ext-body .meta{font-size:11.5px;color:var(--muted);}
.ext-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.ext-actions{display:flex;gap:6px;margin-top:8px;}
.ext-actions .btn{flex:1;justify-content:center;padding:7px 8px;}

/* hazard stripe accent — signature element */
.hazard-strip{height:6px;width:100%;background:repeating-linear-gradient(135deg,var(--accent) 0 10px,#1a1204 10px 20px);opacity:.9;}

/* ===== forms ===== */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:12px;color:var(--muted);font-weight:600;}
.field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{
  background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:13.5px;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.field-row{grid-template-columns:1fr;}}
.photo-upload{
  border:1.5px dashed var(--border);border-radius:10px;height:150px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;color:var(--muted);cursor:pointer;position:relative;overflow:hidden;background:var(--panel-2);
}
.photo-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-upload svg{width:26px;height:26px;}
.photo-upload span{font-size:12px;}
.photo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;}

/* ===== checklist ===== */
.checklist{display:flex;flex-direction:column;gap:0;border:1px solid var(--border-soft);border-radius:10px;overflow:hidden;}
.check-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border-soft);gap:10px;}
.check-row:last-child{border-bottom:none;}
.check-row .num{font-family:var(--font-mono);color:var(--muted-2);font-size:11px;width:18px;flex-shrink:0;}
.check-row .label{font-size:13px;flex:1;}
.seg{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0;}
.seg button{border:none;background:var(--panel-2);color:var(--muted);font-size:10.5px;font-weight:700;padding:6px 8px;border-right:1px solid var(--border);}
.seg button:last-child{border-right:none;}
.seg button.sel[data-v="C"]{background:var(--success);color:#fff;}
.seg button.sel[data-v="NC"]{background:var(--danger);color:#fff;}
.seg button.sel[data-v="NA"]{background:var(--muted-2);color:#fff;}
.seg button.sel[data-v="S.A"]{background:var(--warning);color:#111;}

/* ===== modal ===== */
.overlay{position:fixed;inset:0;background:rgba(8,10,13,0.72);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:100;overflow-y:auto;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:620px;margin:auto;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-soft);}
.modal-head h3{font-family:var(--font-display);font-size:17px;margin:0;}
.modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:8px;}
.icon-btn{background:none;border:none;color:var(--muted);padding:4px;border-radius:6px;}
.icon-btn:hover{background:var(--panel-2);color:var(--text);}
.icon-btn svg{width:18px;height:18px;display:block;}

/* ===== table ===== */
.table-wrap{overflow-x:auto;border:1px solid var(--border-soft);border-radius:10px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px;}
th{text-align:left;padding:10px 12px;background:var(--panel-2);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:9px 12px;border-bottom:1px solid var(--border-soft);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--panel-2);}

/* ===== filters ===== */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filters select,.filters input{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:12.5px;}
.search-box{position:relative;flex:1;min-width:180px;}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted-2);}
.search-box input{width:100%;padding-left:32px;}

/* ===== empty state ===== */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty svg{width:44px;height:44px;color:var(--muted-2);margin-bottom:10px;}
.empty h4{font-family:var(--font-display);color:var(--text);font-size:16px;margin:8px 0 4px 0;}
.empty p{font-size:13px;margin:0;}

/* ===== QR / scanner ===== */
.qr-box{background:#fff;border-radius:10px;padding:10px;display:inline-flex;align-items:center;justify-content:center;}
.qr-label-preview{
  background:#fff;color:#111;border-radius:8px;padding:12px;width:180px;text-align:center;border:3px solid var(--accent);
}
.qr-label-preview .top-stripe{height:5px;background:repeating-linear-gradient(135deg,#e0432a 0 8px,#111 8px 16px);margin:-12px -12px 10px -12px;border-radius:6px 6px 0 0;}
.qr-label-preview b{font-family:var(--font-mono);font-size:13px;display:block;margin-top:6px;}
.qr-label-preview .company{font-size:9px;color:#555;margin-top:2px;}

.scanner-wrap{position:relative;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:1/1;max-width:360px;margin:0 auto;}
.scanner-wrap video{width:100%;height:100%;object-fit:cover;}
.scan-frame{position:absolute;inset:14%;border:2.5px solid var(--accent);border-radius:14px;box-shadow:0 0 0 999px rgba(0,0,0,0.35);}
.scan-hint{text-align:center;font-size:12.5px;color:var(--muted);margin-top:12px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--border);
  padding:11px 18px;border-radius:9px;font-size:13px;z-index:300;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.ok{border-color:var(--success);}
.toast.err{border-color:var(--danger);}

.print-only{display:none;}
@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{position:absolute;top:0;left:0;width:100%;}
  .print-only{display:block;}
}

@media(max-width:860px){
  .sidebar{display:none;}
  .content{padding:16px 14px 90px 14px;}
  .topbar{padding:14px 16px;}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border-soft);
    z-index:50;padding:6px 4px calc(env(safe-area-inset-bottom) + 6px) 4px;
  }
  .bottom-nav button{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;font-size:9.5px;font-weight:600;}
  .bottom-nav button svg{width:19px;height:19px;}
  .bottom-nav button.active{color:var(--accent);}
  .grid-4{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:760px){
  .history-layout{grid-template-columns:1fr!important;}
  .history-summary{grid-template-columns:1fr!important;}
}


/* ===== ficha completa do extintor ===== */
.ext-full-modal{width:min(1240px,96vw);max-height:94vh;}
.ext-full-head{padding:18px 22px;}
.ext-detail-tabs{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  padding:0 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px;
}
.ext-tab{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:0;color:var(--muted);
  padding:10px 12px;border-radius:8px;font-weight:700;cursor:pointer;
}
.ext-tab:hover{background:var(--panel-2);color:var(--text);}
.ext-tab.active{color:var(--text);border-bottom:2px solid var(--accent);border-radius:0;}
.ext-detail-grid{display:grid;grid-template-columns:320px 1fr;gap:16px;}
.ext-side-column{display:flex;flex-direction:column;gap:12px;}
.ext-summary-card,.ext-resume-card,.ext-tip-card,.ext-history-panel{padding:16px;}
.ext-photo-box{
  width:96px;height:150px;border-radius:10px;overflow:hidden;
  background:var(--panel-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ext-photo-box img{width:100%;height:100%;object-fit:cover;}
.ext-photo-placeholder{font-size:11px;color:var(--muted);text-align:center;font-weight:700;}
.ext-small-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.35px;}
.ext-main-value{font-size:17px;font-weight:800;font-family:var(--font-mono);margin-top:2px;}
.ext-main-text{font-size:12.5px;line-height:1.5;margin-top:3px;}
.ext-date-block{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;
  padding-top:14px;border-top:1px solid var(--border);
}
.ext-date-value{font-size:15px;font-weight:800;margin-top:3px;}
.ext-resume-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ext-resume-box{
  background:var(--panel-2);border:1px solid var(--border);
  border-radius:10px;padding:12px;display:flex;gap:10px;align-items:center;
}
.ext-resume-icon{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;
}
.ext-resume-icon.ok{background:rgba(58,166,107,.18);color:var(--ok);}
.ext-resume-icon.warn{background:rgba(217,164,65,.18);color:var(--warn);}
.ext-resume-number{font-size:20px;font-weight:800;line-height:1;}
.ext-resume-label{font-size:11px;color:var(--muted);margin-top:3px;}
.ext-resume-percent{font-size:11px;font-weight:700;margin-top:2px;}
.ext-tip-card{border-color:rgba(217,164,65,.35);}
.ext-history-panel{min-width:0;}
.ext-history-header{
  display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  padding-bottom:14px;border-bottom:1px solid var(--border);
}
.ext-empty-history{padding:40px;text-align:center;color:var(--muted);}
.ext-timeline{position:relative;}
.ext-history-row{
  position:relative;display:grid;
  grid-template-columns:120px minmax(190px,1fr) 140px auto;
  gap:14px;align-items:center;padding:16px 10px 16px 28px;
  border-bottom:1px solid var(--border);
}
.ext-history-row:last-child{border-bottom:0;}
.ext-history-row:before{
  content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--border);
}
.ext-timeline-marker{
  position:absolute;left:5px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;border-radius:50%;border:3px solid var(--panel);
  z-index:2;
}
.ext-timeline-marker.ok{background:var(--ok);}
.ext-timeline-marker.bad{background:var(--bad);}
.ext-history-date-main{font-size:16px;font-weight:800;}
.ext-history-date-sub,.ext-history-note{font-size:11.5px;color:var(--muted);margin-top:4px;}
.ext-history-actions{display:flex;justify-content:flex-end;gap:7px;flex-wrap:wrap;}
.btn-primary{background:rgba(47,116,255,.16);border-color:rgba(47,116,255,.35);color:#79a7ff;}
@media(max-width:980px){
  .ext-detail-grid{grid-template-columns:1fr;}
  .ext-side-column{display:grid;grid-template-columns:1fr 1fr;}
  .ext-tip-card{grid-column:1/-1;}
}
@media(max-width:760px){
  .ext-side-column{display:flex;}
  .ext-history-row{
    grid-template-columns:1fr;
    gap:8px;padding:16px 10px 16px 30px;
  }
  .ext-history-actions{justify-content:flex-start;}
  .ext-history-responsible{display:none;}
  .ext-date-block,.ext-resume-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:520px){
  .ext-date-block,.ext-resume-grid{grid-template-columns:1fr;}
  .ext-photo-box{width:82px;height:125px;}
}


/* ===== visualização moderna da inspeção ===== */
.inspection-view-modal{width:min(900px,96vw);}
.inspection-result-banner{
  display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:12px;
  border:1px solid transparent;margin-bottom:16px;
}
.inspection-result-banner.ok{
  background:rgba(58,166,107,.14);border-color:rgba(58,166,107,.35);
}
.inspection-result-banner.bad{
  background:rgba(224,67,42,.14);border-color:rgba(224,67,42,.35);
}
.inspection-result-dot{
  width:14px;height:14px;border-radius:50%;flex-shrink:0;
}
.inspection-result-banner.ok .inspection-result-dot{background:var(--ok);}
.inspection-result-banner.bad .inspection-result-dot{background:var(--bad);}
.inspection-result-title{font-size:17px;font-weight:900;letter-spacing:.3px;}
.inspection-result-banner.ok .inspection-result-title{color:var(--ok);}
.inspection-result-banner.bad .inspection-result-title{color:var(--bad);}
.inspection-result-sub{font-size:12px;color:var(--muted);margin-top:3px;}

.inspection-summary-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.inspection-summary-card{padding:13px;min-width:0;}
.inspection-summary-label{
  font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.35px;
}
.inspection-summary-value{font-size:14px;font-weight:800;margin-top:6px;word-break:break-word;}
.inspection-summary-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}

.inspection-count-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;
}
.inspection-count-box{
  padding:13px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);
}
.inspection-count-box.ok{border-color:rgba(58,166,107,.28);}
.inspection-count-box.bad{border-color:rgba(224,67,42,.28);}
.inspection-count-box.neutral{border-color:rgba(145,155,170,.24);}
.inspection-count-number{font-size:22px;font-weight:900;}
.inspection-count-box.ok .inspection-count-number{color:var(--ok);}
.inspection-count-box.bad .inspection-count-number{color:var(--bad);}
.inspection-count-label{font-size:11.5px;color:var(--muted);margin-top:2px;}

.inspection-items-list{
  border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--panel);
}
.inspection-item-row{
  display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;
  padding:12px 14px;border-bottom:1px solid var(--border);
}
.inspection-item-row:last-child{border-bottom:0;}
.inspection-item-number{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--panel-2);border:1px solid var(--border);font-weight:800;font-size:12px;
}
.inspection-item-text{font-size:13px;line-height:1.35;}
.inspection-item-status{
  min-width:110px;text-align:center;border-radius:999px;padding:6px 10px;
  font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.25px;
}
.inspection-item-status.ok{background:rgba(58,166,107,.15);color:var(--ok);}
.inspection-item-status.bad{background:rgba(224,67,42,.15);color:var(--bad);}
.inspection-item-status.neutral{background:var(--panel-2);color:var(--muted);}
.inspection-observation{padding:14px;min-height:54px;line-height:1.5;}

@media(max-width:760px){
  .inspection-summary-grid{grid-template-columns:1fr 1fr;}
  .inspection-count-grid{grid-template-columns:1fr;}
  .inspection-item-row{grid-template-columns:36px 1fr;}
  .inspection-item-status{grid-column:2;justify-self:start;min-width:0;}
}
@media(max-width:520px){
  .inspection-summary-grid{grid-template-columns:1fr;}
}


/* ===== dashboard interativo Chart.js ===== */
.dashboard-charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
.chart-card{padding:16px;min-width:0;}
.chart-card-wide{grid-column:1/-1;}
.chart-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;}
.chart-title{font-family:var(--font-display);font-size:16px;font-weight:600;}
.chart-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
.chart-wrap{position:relative;height:290px;}
.chart-wrap.small{height:250px;}
.dashboard-filter-note{
  padding:9px 12px;border:1px solid var(--border-soft);border-radius:8px;
  background:var(--panel-2);font-size:11.5px;color:var(--muted);margin-top:12px;
}
@media(max-width:900px){
  .dashboard-charts{grid-template-columns:1fr;}
  .chart-card-wide{grid-column:auto;}
}
@media(max-width:560px){
  .chart-wrap,.chart-wrap.small{height:240px;}
}

  gap:18px;
  align-items:start;
}

}
.report-card-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  padding-bottom:17px;

  margin-bottom:18px;
}
.report-card-title{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:600;
  margin:0;
}
.report-card-desc{

}
.report-info{
  border:1px solid rgba(79,124,255,.30);

  line-height:1.5;

}
.report-actions{

  align-items:center;
  margin-top:4px;
}
.report-actions .btn{

}
.report-primary{

}
.report-side{
  display:grid;

}
.report-qr-card .report-actions{
  margin-top:18px;
}
.report-tips{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:18px;
}
.report-tip{
  background:var(--panel);
  border:1px solid var(--border-soft);
  border-radius:12px;
  padding:16px;
  min-height:132px;
}
.report-tip-title{
  font-family:var(--font-display);
  font-size:14px;
  font-weight:600;
  margin-bottom:7px;
}
.report-tip-text{
  font-size:11.5px;

}

}

  .report-card-head{margin-bottom:14px;}
  .report-actions{flex-direction:column;}
  .report-actions .btn{width:100%;justify-content:center;}
}


/* ===== Inspecionar — interface moderna sem ícones gigantes ===== */
.inspect-layout{
  display:grid;
  grid-template-columns:minmax(340px,.92fr) minmax(420px,1.08fr);
  gap:18px;
  align-items:start;
}
.inspect-card{
  background:linear-gradient(180deg,rgba(31,39,48,.98),rgba(27,33,40,.98));
  border:1px solid var(--border-soft);
  border-radius:14px;
  padding:22px;
  min-width:0;
}
.inspect-card-head{
  padding-bottom:16px;
  border-bottom:1px solid var(--border-soft);
  margin-bottom:18px;
}
.inspect-card-title{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:600;
  margin:0;
}
.inspect-card-desc{
  font-size:12.5px;
  line-height:1.55;
  color:var(--muted);
  margin-top:5px;
}
.inspect-scanner-shell{
  border:1px solid var(--border);
  background:#0d1116;
  border-radius:12px;
  padding:12px;
}
.inspect-scanner-shell .scanner-wrap{
  max-width:none;
  width:100%;
  aspect-ratio:4/3;
}
.inspect-scanner-shell .scan-frame{
  inset:12%;
  border-width:2px;
}
.inspect-note{
  margin-top:12px;
  padding:10px 12px;
  border-radius:9px;
  border:1px solid rgba(224,67,42,.25);

  color:#bbc3cc;
  font-size:11.5px;
  line-height:1.5;
}
.inspect-actions{
  margin-top:12px;

  gap:9px;
}
.inspect-actions .btn{
  width:100%;
  min-height:42px;
  justify-content:center;
}
.inspect-divider{
  display:flex;
  align-items:center;
  gap:12px;
  color:var(--muted-2);
  font-size:11px;
  margin:2px 0;
}
.inspect-divider::before,
.inspect-divider::after{
  content:'';
  height:1px;
  background:var(--border-soft);
  flex:1;
}
.manual-search-wrap{
  margin-bottom:12px;
}
.manual-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height:500px;
  overflow-y:auto;
  padding-right:3px;
}
.manual-ext-row{
  width:100%;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:14px;
  align-items:center;
  text-align:left;
  padding:13px 14px;
  border:1px solid var(--border-soft);
  border-radius:10px;
  background:var(--panel-2);
  color:var(--text);

}
.manual-ext-row:hover{
  border-color:var(--muted-2);
  transform:translateY(-1px);
}
.manual-ext-main{min-width:0;}

}
.manual-ext-usina{
  font-size:13px;
  font-weight:700;
  margin-top:3px;
}
.manual-ext-local{
  font-size:11.5px;

  overflow:hidden;

.manual-ext-side{
  display:flex;
  align-items:flex-end;
  flex-direction:column;
  gap:7px;
}
.manual-ext-meta{
  font-size:10.5px;
  color:var(--muted);
  white-space:nowrap;
}
.manual-ext-status{
  display:inline-flex;
  align-items:center;
  padding:4px 8px;
  border-radius:999px;
  font-size:9.5px;

  white-space:nowrap;
}
.manual-ext-status.em-campo{background:rgba(58,166,107,.15);color:#4dcc83;}
.manual-ext-status.estoque{background:rgba(79,124,255,.15);color:#7b9cff;}
.manual-ext-status.recarga{background:rgba(217,164,65,.15);color:#e6b34f;}
.manual-ext-status.desativado{background:rgba(224,67,42,.15);color:#ff6a52;}
.inspect-help{
  margin-top:18px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.inspect-help-item{
  background:var(--panel);
  border:1px solid var(--border-soft);
  border-radius:12px;
  padding:16px;
}
.inspect-help-step{
  font-family:var(--font-mono);
  color:var(--accent);
  font-size:11px;
  font-weight:700;
}
.inspect-help-title{
  font-family:var(--font-display);
  font-size:14px;
  font-weight:600;
  margin-top:6px;
}
.inspect-help-text{
  color:var(--muted);
  font-size:11.5px;
  line-height:1.55;
  margin-top:5px;
}
@media(max-width:1050px){
  .inspect-layout{grid-template-columns:1fr;}
}
@media(max-width:700px){
  .inspect-card{padding:16px;}
  .inspect-help{grid-template-columns:1fr;}
  .manual-ext-row{grid-template-columns:1fr;}
  .manual-ext-side{align-items:flex-start;}
  .inspect-scanner-shell .scanner-wrap{aspect-ratio:1/1;}
}

.user-role-pill{

}

}

.user-name{font-family:var(--font-display);font-size:16px;font-weight:600;}
.user-email{font-size:11.5px;color:var(--muted);margin-top:3px;word-break:break-all;}
.user-meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
.user-actions{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;}
.user-actions .btn{flex:1;justify-content:center;}
.access-banner{

}
.access-banner-name{font-size:12px;font-weight:700;}
.access-banner-email{font-size:10.5px;color:var(--muted);margin-top:2px;}
.permission-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}

.permission-card p{font-size:11px;color:var(--muted);line-height:1.5;margin:6px 0 0;}
@media(max-width:760px){.permission-grid{grid-template-columns:1fr;}.access-banner{align-items:flex-start;flex-direction:column;}}

async function initFirebase(){
  try{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js");
    const { getFirestore } = await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js");

function loadLocalKey(key, fallback){
  try{
    const raw = localStorage.getItem('extintores:'+key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}

function saveLocalKey(key, val){
  try{
    localStorage.setItem('extintores:'+key, JSON.stringify(val));
  }catch(e){
    console.error("local cache save error", e);
  }
}

async function readLegacyAppData(key, fallback){
  if(!FIREBASE_READY || !FIREBASE_DB) return fallback;
  try{
    const { doc, getDoc } =
      await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js");
    const snap = await getDoc(doc(FIREBASE_DB, "appData", key));
    return snap.exists() ? (snap.data().value ?? fallback) : fallback;
  }catch(e){
    console.error("Legacy read error", key, e);
    return fallback;
  }
}

async function loadConfig(){
  const localConfig = loadLocalKey('config', STATE.config);
  if(!FIREBASE_READY || !FIREBASE_DB) return localConfig;

  try{
    const { doc, getDoc, setDoc, serverTimestamp } =
      await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js");

    const ref = doc(FIREBASE_DB, "settings", "main");
    const snap = await getDoc(ref);

    if(snap.exists()){
      const data = snap.data();
      const config = data.value || data.config || localConfig;
      saveLocalKey('config', config);
      return config;
    }

    // Migra configuração antiga, se existir.
    const legacy = await readLegacyAppData('config', localConfig);
    await setDoc(ref, { value: legacy, updatedAt: serverTimestamp() }, { merge: true });
    saveLocalKey('config', legacy);
    return legacy;
  }catch(e){
    console.error("Config load error", e);
    return localConfig;
  }
}

async function loadCollectionData(collectionName, localKey){
  const localValue = loadLocalKey(localKey, []);
  if(!FIREBASE_READY || !FIREBASE_DB) return localValue;

  try{
    const { collection, getDocs, doc, setDoc, serverTimestamp } =
      await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js");

    const snap = await getDocs(collection(FIREBASE_DB, collectionName));
    if(!snap.empty){
      const items = snap.docs.map(d => ({ ...d.data(), id: d.data().id || d.id }));
      saveLocalKey(localKey, items);
      return items;
    }

    // Coleção nova vazia: tenta migrar o array antigo de appData.
    const legacy = await readLegacyAppData(localKey, localValue);
    if(Array.isArray(legacy) && legacy.length){
      for(const item of legacy){
        if(!item || !item.id) continue;
        await setDoc(
          doc(FIREBASE_DB, collectionName, String(item.id)),
          { ...item, migratedAt: serverTimestamp() },
          { merge: true }
        );
      }
      saveLocalKey(localKey, legacy);
      return legacy;
    }

    return localValue;
  }catch(e){
    console.error("Collection load error", collectionName, e);
    return localValue;
  }
}

async function syncCollectionData(collectionName, localKey, items){
  saveLocalKey(localKey, items);

  if(!FIREBASE_READY || !FIREBASE_DB){
    console.warn("Firebase indisponível; dados mantidos apenas no cache local.");
    return;
  }

  try{
    const { collection, getDocs, doc, setDoc, deleteDoc, serverTimestamp } =
      await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js");

    const colRef = collection(FIREBASE_DB, collectionName);
    const existingSnap = await getDocs(colRef);
    const currentIds = new Set(
      items.filter(item => item && item.id).map(item => String(item.id))
    );

    // Salva/atualiza cada registro em seu próprio documento.
    for(const item of items){
      if(!item || !item.id) continue;
      await setDoc(
        doc(FIREBASE_DB, collectionName, String(item.id)),
        { ...item, updatedAt: serverTimestamp() },
        { merge: true }
      );
    }

    // Remove da nuvem documentos que foram excluídos no sistema.
    for(const existing of existingSnap.docs){
      if(!currentIds.has(existing.id)){
        await deleteDoc(existing.ref);
      }
    }
  }catch(e){
    console.error("Collection sync error", collectionName, e);
    showToast("Dados salvos no dispositivo, mas a sincronização com a nuvem falhou.","err");
  }
}

async function loadAll(){
  const [config, extinguishers, inspections] = await Promise.all([
    loadConfig(),
    loadCollectionData('extinguishers', 'extinguishers'),
    loadCollectionData('inspections', 'inspections'),
  ]);

  STATE.config = Object.assign(STATE.config, config);
  STATE.extinguishers = Array.isArray(extinguishers) ? extinguishers : [];
  STATE.inspections = Array.isArray(inspections) ? inspections : [];

  // Migração de dados antigos: campo "setor"/"sectors" -> "usina"/"usinas"
  let migrated = false;
  if(!STATE.config.usinas && Array.isArray(STATE.config.sectors)){
    STATE.config.usinas = STATE.config.sectors;
    delete STATE.config.sectors;
    migrated = true;
  }
  if(!STATE.config.usinas || STATE.config.usinas.length===0){
    STATE.config.usinas = [...DEFAULT_USINAS];
    migrated = true;
  }
  const renameIdx = STATE.config.usinas.indexOf("UTE Monte Cristo");
  if(renameIdx>-1){
    STATE.config.usinas[renameIdx] = "UTE Monte Cristo/Sucuba";
    migrated = true;
  }
  STATE.extinguishers.forEach(e=>{
    if(e.usina===undefined && e.setor!==undefined){
      e.usina = e.setor;
      delete e.setor;
      migrated = true;
    }
    if(e.usina==="UTE Monte Cristo"){
      e.usina = "UTE Monte Cristo/Sucuba";
      migrated = true;
    }
  });

  if(migrated){
    await persistConfig();
    await persistExtinguishers();
  }

  STATE.loaded = true;
}

/* ============================================================

function uid(prefix){ return prefix+"-"+Math.random().toString(36).slice(2,9).toUpperCase(); }
function fmtDate(d){ if(!d) return "—"; const dt=new Date(d+"T00:00:00"); if(isNaN(dt)) return "—"; return dt.toLocaleDateString('pt-BR'); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysUntil(dateStr){
  if(!dateStr) return null;
  const target = new Date(dateStr+"T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((target-now)/86400000);
}
function dateStatus(dateStr, allowAlert=true){
  const d = daysUntil(dateStr);
  if(d===null) return {label:"—", cls:"neutral", days:null};
  if(d<0) return {label:"VENCIDO", cls:"bad", days:d};
  if(allowAlert && d<=STATE.config.alertDays) return {label:"ALERTA", cls:"warn", days:d};
  return {label:"VÁLIDO", cls:"ok", days:d};
}
function lastInspection(extId){
  const list = STATE.inspections.filter(i=>i.extinguisherId===extId).sort((a,b)=> b.date.localeCompare(a.date));
  return list[0] || null;
}

function extinguisherDirectUrl(extId){
  const url = new URL(window.location.href);
  url.search = "";
  url.hash = "";
  url.searchParams.set("ext", extId);
  return url.toString();
}

function extinguisherIdFromQrData(data){
  if(!data) return null;
  const raw = String(data).trim();

  // Compatibilidade com etiquetas antigas que guardavam somente o ID.
  if(STATE.extinguishers.some(e=>e.id===raw)) return raw;

  try{
    const url = new URL(raw);
    return url.searchParams.get("ext");
  }catch(e){
    return null;
  }
}

function openRequestedExtinguisherFromUrl(){
  if(!can('inspect')) return;
  const params = new URLSearchParams(window.location.search);
  const extId = params.get("ext");
  if(!extId) return;

  const ext = STATE.extinguishers.find(e=>e.id===extId);
  if(ext){
    setTimeout(()=>openQuickInspectionPanel(ext.id), 80);
  }else{
    setTimeout(()=>showToast("Extintor do QR Code não encontrado.","err"), 100);
  }

  // Limpa o parâmetro para a ficha não reabrir a cada atualização.
  const cleanUrl = new URL(window.location.href);
  cleanUrl.searchParams.delete("ext");
  history.replaceState({}, "", cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
}
function escapeHtml(s){ s = (s===null||s===undefined) ? "" : String(s); return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg, type="ok"){
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = "toast "+type;
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),300); }, 2600);
}
function fileToDataUrl(file, maxDim=900){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let {width,height} = img;
        if(width>maxDim || height>maxDim){
          if(width>height){ height = Math.round(height*maxDim/width); width = maxDim; }
          else{ width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width=width; canvas.height=height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const ROLE_PERMISSIONS = {

function currentRole(){
  return CURRENT_USER_PROFILE?.role || 'VISUALIZADOR';
}
function can(permission){
  return !!ROLE_PERMISSIONS[currentRole()]?.[permission];
}
function requirePermission(permission, message="Você não possui permissão para realizar esta ação."){
  if(can(permission)) return true;
  showToast(message,"err");
  return false;
}
function defaultViewForRole(){
  if(can('dashboard')) return 'dashboard';
  if(can('reports')) return 'reports';
  return 'reports';
}
function roleClass(role){
  if(role==='ADMINISTRADOR') return 'admin';
  if(role==='INSPETOR') return 'inspector';
  return 'viewer';
}
function normalizeRole(role){
  return ['ADMINISTRADOR','INSPETOR','VISUALIZADOR'].includes(role) ? role : 'VISUALIZADOR';
}

async function loadCurrentUserProfile(){
  if(!AUTH_USER || !FIREBASE_DB) return null;
  const { doc, getDoc, setDoc, collection, getDocs, query, limit, serverTimestamp } =
    await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js");

  const ref = doc(FIREBASE_DB, "users", AUTH_USER.uid);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const profile = {uid:AUTH_USER.uid, ...snap.data()};
    if(profile.active === false) throw new Error("USER_DISABLED");
    CURRENT_USER_PROFILE = {
      ...profile,
      role:normalizeRole(profile.role),
      usina: normalizeRole(profile.role)==='ADMINISTRADOR' ? 'TODAS' : (profile.usina || ''),
      active:profile.active !== false
    };
    return CURRENT_USER_PROFILE;
  }

  // Compatibilidade inicial: o primeiro usuário autenticado torna-se administrador.
  const firstUsers = await getDocs(query(collection(FIREBASE_DB, "users"), limit(1)));
  if(firstUsers.empty){
    const profile = {
      uid:AUTH_USER.uid,
      name:AUTH_USER.displayName || AUTH_USER.email?.split('@')[0] || 'Administrador',
      email:AUTH_USER.email || '',
      role:'ADMINISTRADOR',
      usina:'TODAS',
      active:true,
      createdAt:serverTimestamp(),
      updatedAt:serverTimestamp()
    };
    await setDoc(ref, profile, {merge:true});
    CURRENT_USER_PROFILE = {...profile, createdAt:null, updatedAt:null};
    return CURRENT_USER_PROFILE;
  }

  throw new Error("PROFILE_NOT_FOUND");
}

async function loadUsers(){
  if(!can('users')) return [];
  const { collection, getDocs } =
    await import("https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js");
  const snap = await getDocs(collection(FIREBASE_DB, "users"));
  USERS_CACHE = snap.docs.map(d=>({uid:d.id,...d.data()}))
    .sort((a,b)=>(a.name||a.email||'').localeCompare(b.name||b.email||'','pt-BR'));
  return USERS_CACHE;
}

  const thStatus = ext.map(e=>dateStatus(e.dataTH,false).label);
  const nc = ext.filter(e=>{ const li=lastInspection(e.id); return li && li.resultado==='NÃO CONFORME'; }).length;
  const emCampo = ext.filter(e=>(e.statusGeral||'EM CAMPO')==='EM CAMPO').length;
  const estoque = ext.filter(e=>e.statusGeral==='ESTOQUE').length;
  const recargaOp = ext.filter(e=>e.statusGeral==='ENVIADO PARA RECARGA').length;
  const desativado = ext.filter(e=>e.statusGeral==='DESATIVADO').length;

  const valido = recStatus.filter(s=>s==='VÁLIDO').length;
  const alerta = recStatus.filter(s=>s==='ALERTA').length;
  const vencido = recStatus.filter(s=>s==='VENCIDO').length;

  const byUsina = {};
  ext.forEach(e=>{ byUsina[e.usina||'Sem usina']=(byUsina[e.usina||'Sem usina']||0)+1; });

  const expiryBuckets = {
    "Vencidos":0,
    "Até 30 dias":0,
    "31 a 60 dias":0,
    "61 a 90 dias":0,
    "Acima de 90 dias":0
  };
  ext.forEach(e=>{
    const d = daysUntil(e.dataRecarga);
    if(d===null) return;
    if(d<0) expiryBuckets["Vencidos"]++;
    else if(d<=30) expiryBuckets["Até 30 dias"]++;
    else if(d<=60) expiryBuckets["31 a 60 dias"]++;
    else if(d<=90) expiryBuckets["61 a 90 dias"]++;
    else expiryBuckets["Acima de 90 dias"]++;
  });

  const monthKeys = [];
  const monthLabels = [];
  const now = new Date();
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    monthKeys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    monthLabels.push(d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}).replace('.',''));
  }

  const monthlyConformity = monthKeys.map(key=>{
    const list = STATE.inspections.filter(i=>(i.date||'').slice(0,7)===key);
    if(!list.length) return 0;
    return Math.round(list.filter(i=>i.resultado==='CONFORME').length/list.length*100);
  });

  const ncFrequency = {};
  STATE.inspections.forEach(insp=>{
    (insp.checklist||[]).forEach(item=>{
      if(item.valor==='NC'){
        ncFrequency[item.item]=(ncFrequency[item.item]||0)+1;
      }
    });
  });
  const topNC = Object.entries(ncFrequency).sort((a,b)=>b[1]-a[1]).slice(0,6);

  content.innerHTML = `
    <div class="grid grid-4">
      <div class="card stat-card">
        <div class="label">Total de extintores</div>
        <div class="value">${ext.length}</div>
        <div class="bar"><i style="width:100%;background:var(--muted-2)"></i></div>
      </div>
      <div class="card stat-card">
        <div class="label">Recarga válida</div>
        <div class="value" style="color:var(--success)">${valido}</div>
        <div class="bar"><i style="width:${ext.length?valido/ext.length*100:0}%;background:var(--success)"></i></div>
      </div>
      <div class="card stat-card">
        <div class="label">Recarga em alerta</div>
        <div class="value" style="color:var(--warning)">${alerta}</div>
        <div class="bar"><i style="width:${ext.length?alerta/ext.length*100:0}%;background:var(--warning)"></i></div>
      </div>
      <div class="card stat-card">
        <div class="label">Recarga vencida</div>
        <div class="value" style="color:var(--danger)">${vencido}</div>
        <div class="bar"><i style="width:${ext.length?vencido/ext.length*100:0}%;background:var(--danger)"></i></div>
      </div>
    </div>

    <div class="dashboard-charts">
      <div class="card chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Status operacional</div>
            <div class="chart-sub">Clique em uma categoria para abrir os extintores correspondentes.</div>
          </div>
        </div>
        <div class="chart-wrap small"><canvas id="chart-status"></canvas></div>
      </div>

      <div class="card chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Extintores por usina</div>
            <div class="chart-sub">Distribuição dos equipamentos cadastrados.</div>
          </div>
        </div>
        <div class="chart-wrap small"><canvas id="chart-usinas"></canvas></div>
      </div>

      <div class="card chart-card chart-card-wide">
        <div class="chart-head">
          <div>
            <div class="chart-title">Conformidade das inspeções</div>
            <div class="chart-sub">Percentual mensal de inspeções conformes nos últimos seis meses.</div>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="chart-conformidade"></canvas></div>
      </div>

      <div class="card chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Próximos vencimentos</div>
            <div class="chart-sub">Quantidade de recargas por faixa de prazo.</div>
          </div>
        </div>
        <div class="chart-wrap small"><canvas id="chart-vencimentos"></canvas></div>
      </div>

      <div class="card chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Não conformidades frequentes</div>
            <div class="chart-sub">Itens do checklist que mais apresentaram problemas.</div>
          </div>
        </div>
        <div class="chart-wrap small">
          ${topNC.length ? '<canvas id="chart-nc"></canvas>' : '<div class="empty" style="padding:55px 10px;"><h4>Nenhuma não conformidade</h4><p>Os itens aparecerão aqui quando houver registros.</p></div>'}
        </div>
      </div>
    </div>

    <div class="section-title">Próximos vencimentos de recarga</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nº</th><th>Usina</th><th>Local</th><th>Vencimento</th><th>Dias</th><th>Status</th></tr></thead>
        <tbody>
        ${ext.slice().sort((a,b)=> (daysUntil(a.dataRecarga)??9999) - (daysUntil(b.dataRecarga)??9999)).slice(0,8).map(e=>{
          const s = dateStatus(e.dataRecarga);
          return `<tr><td>${escapeHtml(e.numero)}</td><td>${escapeHtml(e.usina)}</td><td>${escapeHtml(e.localizacao)}</td><td>${fmtDate(e.dataRecarga)}</td><td>${s.days??'—'}</td><td><span class="chip ${s.cls}">${s.label}</span></td></tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>
  `;

  if(typeof Chart==='undefined'){
    showToast("Os gráficos não puderam ser carregados.","err");
    return;
  }

  Chart.defaults.color = '#8b96a3';
  Chart.defaults.borderColor = 'rgba(139,150,163,.16)';
  Chart.defaults.font.family = "'Inter', sans-serif";

  const commonPlugins = {
    legend:{labels:{usePointStyle:true,boxWidth:9,padding:14}},
    tooltip:{
      backgroundColor:'#232b33',
      titleColor:'#e9edf1',
      bodyColor:'#e9edf1',
      borderColor:'#333d47',
      borderWidth:1,
      padding:10
    }
  };

  const statusLabels = ['Em campo','Estoque','Enviado para recarga','Desativado'];
  const statusValues = [emCampo,estoque,recargaOp,desativado];
  const statusChart = new Chart(document.getElementById('chart-status'),{
    type:'doughnut',
    data:{
      labels:statusLabels,
      datasets:[{
        data:statusValues,
        backgroundColor:['#3aa66b','#4f7cff','#d9a441','#e0432a'],
        borderColor:'#1b2128',
        borderWidth:3,
        hoverOffset:8
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      cutout:'62%',
      plugins:commonPlugins,
      onClick:(evt,elements)=>{
        if(!elements.length) return;
        const map=['EM CAMPO','ESTOQUE','ENVIADO PARA RECARGA','DESATIVADO'];
        extFilters.operational = map[elements[0].index];
        STATE.view='extinguishers';
        renderShell();
      }
    }
  });
  DASHBOARD_CHARTS.push(statusChart);

  const usinaChart = new Chart(document.getElementById('chart-usinas'),{
    type:'bar',
    data:{
      labels:Object.keys(byUsina),
      datasets:[{
        label:'Extintores',
        data:Object.values(byUsina),
        backgroundColor:'rgba(79,124,255,.65)',
        borderColor:'#4f7cff',
        borderWidth:1,
        borderRadius:6
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      indexAxis:Object.keys(byUsina).length>4?'y':'x',
      plugins:{...commonPlugins,legend:{display:false}},
      scales:{
        y:{beginAtZero:true,ticks:{precision:0}},
        x:{beginAtZero:true,ticks:{precision:0}}
      }
    }
  });
  DASHBOARD_CHARTS.push(usinaChart);

  const conformityChart = new Chart(document.getElementById('chart-conformidade'),{
    type:'line',
    data:{
      labels:monthLabels,
      datasets:[{
        label:'Conformidade',
        data:monthlyConformity,
        borderColor:'#3aa66b',
        backgroundColor:'rgba(58,166,107,.15)',
        fill:true,
        tension:.35,
        pointRadius:4,
        pointHoverRadius:6
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:commonPlugins,
      scales:{
        y:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}},
        x:{grid:{display:false}}
      }
    }
  });
  DASHBOARD_CHARTS.push(conformityChart);

  const expiryChart = new Chart(document.getElementById('chart-vencimentos'),{
    type:'bar',
    data:{
      labels:Object.keys(expiryBuckets),
      datasets:[{
        label:'Extintores',
        data:Object.values(expiryBuckets),
        backgroundColor:['rgba(224,67,42,.75)','rgba(217,164,65,.75)','rgba(79,124,255,.7)','rgba(58,166,107,.65)','rgba(139,150,163,.55)'],
        borderRadius:6
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{...commonPlugins,legend:{display:false}},
      scales:{
        y:{beginAtZero:true,ticks:{precision:0}},
        x:{grid:{display:false}}
      }
    }
  });
  DASHBOARD_CHARTS.push(expiryChart);

  if(topNC.length){
    const ncChart = new Chart(document.getElementById('chart-nc'),{
      type:'bar',
      data:{
        labels:topNC.map(x=>x[0]),
        datasets:[{
          label:'Ocorrências',
          data:topNC.map(x=>x[1]),
          backgroundColor:'rgba(224,67,42,.7)',
          borderColor:'#e0432a',
          borderWidth:1,
          borderRadius:6
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        indexAxis:'y',
        plugins:{...commonPlugins,legend:{display:false}},
        scales:{
          x:{beginAtZero:true,ticks:{precision:0}},
          y:{grid:{display:false}}
        }
      }
    });
    DASHBOARD_CHARTS.push(ncChart);
  }
}

function emptyState(icon,title,text,ctaLabel){
  return `<div class="empty">${ICONS[icon]||ICONS.ext}<h4>${title}</h4><p>${text}</p>
    ${ctaLabel?`<div style="margin-top:16px;"><button class="btn btn-accent" id="empty-cta">${ICONS.plus}${ctaLabel}</button></div>`:''}
  </div>`;
}

/* ============================================================
   EXTINGUISHERS LIST
============================================================ */
let extFilters = { usina:'', status:'', operational:'', search:'' };

function renderExtinguishers(){
  setHeader("Extintores", `${STATE.extinguishers.length} cadastrado(s)`,
    can('manageExtinguishers') ? `<button class="btn btn-accent" id="btn-new-ext">${ICONS.plus}Novo extintor</button>` : '');
  document.getElementById('btn-new-ext')?.addEventListener('click', ()=>openExtinguisherModal());

  const content = document.getElementById('content');
  const usinas = STATE.config.usinas;
  let list = STATE.extinguishers.slice();
  if(extFilters.usina) list = list.filter(e=>e.usina===extFilters.usina);
  if(extFilters.status) list = list.filter(e=>dateStatus(e.dataRecarga).label===extFilters.status);
  if(extFilters.operational) list = list.filter(e=>(e.statusGeral||'EM CAMPO')===extFilters.operational);
  if(extFilters.search){
    const q = extFilters.search.toLowerCase();
    list = list.filter(e=> (e.numero+e.localizacao+e.usina+e.agente).toLowerCase().includes(q));
  }

  content.innerHTML = `
    <div class="filters">
      <div class="search-box">${ICONS.search}<input type="text" id="f-search" placeholder="Buscar por nº, local, usina..." value="${escapeHtml(extFilters.search)}"></div>
      <select id="f-usina"><option value="">Todas as usinas</option>${usinas.map(s=>`<option ${extFilters.usina===s?'selected':''}>${escapeHtml(s)}</option>`).join('')}</select>
      <select id="f-status"><option value="">Todos os status de recarga</option><option ${extFilters.status==='VÁLIDO'?'selected':''}>VÁLIDO</option><option ${extFilters.status==='ALERTA'?'selected':''}>ALERTA</option><option ${extFilters.status==='VENCIDO'?'selected':''}>VENCIDO</option></select><select id="f-operational"><option value="">Todos os status operacionais</option>${['EM CAMPO','ESTOQUE','ENVIADO PARA RECARGA','DESATIVADO'].map(s=>`<option ${extFilters.operational===s?'selected':''}>${s}</option>`).join('')}</select>
    </div>
    ${list.length===0 ? emptyState('ext','Nenhum extintor encontrado','Ajuste os filtros para localizar um equipamento.',can('manageExtinguishers')?'Cadastrar extintor':null) : `<div class="grid ext-grid">${list.map(cardExt).join('')}</div>`}
  `;
  document.getElementById('empty-cta')?.addEventListener('click', ()=>openExtinguisherModal());
  document.getElementById('f-search').addEventListener('input', e=>{extFilters.search=e.target.value; renderExtinguishers();});
  document.getElementById('f-usina').addEventListener('change', e=>{extFilters.usina=e.target.value; renderExtinguishers();});
  document.getElementById('f-status').addEventListener('change', e=>{extFilters.status=e.target.value; renderExtinguishers();});
  document.getElementById('f-operational').addEventListener('change', e=>{extFilters.operational=e.target.value; renderExtinguishers();});

  content.querySelectorAll('[data-view-ext]').forEach(b=>b.addEventListener('click', ()=>openExtinguisherDetail(b.dataset.viewExt)));
  content.querySelectorAll('[data-edit-ext]').forEach(b=>b.addEventListener('click', (e)=>{e.stopPropagation();openExtinguisherModal(b.dataset.editExt);}));
  content.querySelectorAll('[data-del-ext]').forEach(b=>b.addEventListener('click', (e)=>{e.stopPropagation();deleteExtinguisher(b.dataset.delExt);}));
}

function operationalStatusMeta(status){
  const s = (status || 'EM CAMPO').toUpperCase();
  if(s === 'ESTOQUE') return {label:'ESTOQUE', cls:'estoque'};
  if(s === 'ENVIADO PARA RECARGA') return {label:'ENVIADO PARA RECARGA', cls:'recarga'};
  if(s === 'DESATIVADO') return {label:'DESATIVADO', cls:'desativado'};
  return {label:'EM CAMPO', cls:'em-campo'};
}

function cardExt(e){
  const rec = dateStatus(e.dataRecarga);
  const th = dateStatus(e.dataTH,false);
  const li = lastInspection(e.id);
  const st = operationalStatusMeta(e.statusGeral);
  return `
  <div class="ext-card status-${st.cls}" data-view-ext="${e.id}" style="cursor:pointer;">
    <div class="ext-photo">
      ${e.foto?`<img src="${e.foto}">`:`<div class="no-photo">${ICONS.photo}</div>`}
      <div class="ext-num">#${escapeHtml(e.numero)}</div>
    </div>
    <div class="ext-body">
      <div class="loc">${escapeHtml(e.localizacao)}</div>
      <div class="meta">${escapeHtml(e.usina)} · ${escapeHtml(e.agente)} · ${escapeHtml(e.capacidade||'')}</div>
      <div class="status-op ${st.cls}">${st.label}</div>
      <div class="ext-chips">
        <span class="chip ${rec.cls}">Recarga: ${rec.label}</span>
        <span class="chip ${th.cls}">TH: ${th.label}</span>
        ${li && li.resultado==='NÃO CONFORME' ? `<span class="chip bad">NC na inspeção</span>` : ''}
      </div>
      ${can('manageExtinguishers') ? `<div class="ext-actions">
        <button class="btn btn-sm" data-edit-ext="${e.id}">${ICONS.edit}Editar</button>
        <button class="btn btn-sm btn-danger" data-del-ext="${e.id}">${ICONS.trash}</button>
      </div>` : ''}
    </div>
  </div>`;
}

async function deleteExtinguisher(id){
  if(!requirePermission('manageExtinguishers')) return;
  if(!confirm("Excluir este extintor e todo seu histórico de inspeções?")) return;
  STATE.extinguishers = STATE.extinguishers.filter(e=>e.id!==id);
  STATE.inspections = STATE.inspections.filter(i=>i.extinguisherId!==id);
  await persistExtinguishers(); await persistInspections();
  showToast("Extintor excluído");
  renderExtinguishers();
}

/* ============================================================
   MODAL: NOVO / EDITAR EXTINTOR
============================================================ */
function openModal(html){
  document.getElementById('modal-root').innerHTML = `<div class="overlay" id="overlay">${html}</div>`;
  document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

function openExtinguisherModal(id){
  if(!requirePermission('manageExtinguishers')) return;
  const editing = !!id;
  const e = editing ? STATE.extinguishers.find(x=>x.id===id) : {
    id: uid('EXT'), numero: (Math.max(0,...STATE.extinguishers.map(x=>parseInt(x.numero)||0))+1),
    foto:null, usina: STATE.config.usinas[0]||'', localizacao:'', agente: STATE.config.agents[0]||'',
    capacidade:'', dataRecarga:'', dataTH:'', statusGeral:'EM CAMPO',
  };
  const usinas = STATE.config.usinas, agents = STATE.config.agents;
  const checklistAnswers = {};
  CHECK_ITEMS.forEach((_,i)=>checklistAnswers[i]='C');

  openModal(`
    <div class="modal">
      <div class="modal-head"><h3>${editing?'Editar extintor':'Novo extintor'}</h3><button class="icon-btn" id="m-close">${ICONS.close}</button></div>
      <div class="modal-body">
        <div class="field"><label>Foto do extintor</label>
          <label class="photo-upload">
            ${e.foto?`<img src="${e.foto}" id="photo-preview">`:`${ICONS.upload}<span>Toque para enviar uma foto</span>`}
            <input type="file" accept="image/*" id="f-foto">
          </label>
        </div>
        <div class="field-row">
          <div class="field"><label>Número</label><input type="text" id="f-numero" value="${escapeHtml(e.numero)}"></div>
          <div class="field"><label>Status geral</label>
            <select id="f-statusgeral">
              ${['EM CAMPO','ESTOQUE','ENVIADO PARA RECARGA','DESATIVADO'].map(s=>`<option ${e.statusGeral===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field"><label>Usina</label><select id="fm-usina">${usinas.map(s=>`<option ${e.usina===s?'selected':''}>${escapeHtml(s)}</option>`).join('')}</select></div>
          <div class="field"><label>Localização / Grupo</label><input type="text" id="f-local" placeholder="Ex: Grupo 01" value="${escapeHtml(e.localizacao)}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Agente extintor</label><select id="f-agente">${agents.map(a=>`<option ${e.agente===a?'selected':''}>${escapeHtml(a)}</option>`).join('')}</select></div>
          <div class="field"><label>Capacidade (Kg/Lt)</label><input type="text" id="f-cap" placeholder="Ex: 50 KG" value="${escapeHtml(e.capacidade)}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Vencimento da recarga</label><input type="date" id="f-recarga" value="${e.dataRecarga||''}"></div>
          <div class="field"><label>Vencimento do teste hidrostático</label><input type="date" id="f-th" value="${e.dataTH||''}"></div>
        </div>
        ${editing ? '' : `
        <div class="section-title">Checklist de inspeção inicial</div>
        <div class="checklist" id="cad-checklist">
          ${CHECK_ITEMS.map((label,i)=>`
            <div class="check-row">
              <span class="num">${i+1}</span>
              <span class="label">${label}</span>
              <div class="seg" data-item="${i}">
                ${['C','NC','NA','S.A'].map(v=>`<button type="button" data-v="${v}" class="${v==='C'?'sel':''}">${v}</button>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
        <div class="field-row" style="margin-top:14px;">
          <div class="field"><label>Responsável pela inspeção inicial</label><input type="text" id="f-resp-cad" placeholder="Nome do inspetor"></div>
          <div class="field"><label>Data da inspeção</label><input type="date" id="f-data-cad" value="${todayISO()}"></div>
        </div>
        <div class="field"><label>Observações</label><textarea id="f-obs-cad" placeholder="Ex: mangueira rachada, despressurizado..."></textarea></div>
        `}
      </div>
      <div class="modal-foot">
        <button class="btn" id="m-cancel">Cancelar</button>
        <button class="btn btn-accent" id="m-save">${editing?'Salvar alterações':'Cadastrar extintor'}</button>
      </div>
    </div>
  `);
  document.getElementById('m-close').addEventListener('click', closeModal);
  document.getElementById('m-cancel').addEventListener('click', closeModal);
  function bindFotoInput(){
    document.getElementById('f-foto').addEventListener('change', async ev=>{
      const file = ev.target.files[0]; if(!file) return;
      const dataUrl = await fileToDataUrl(file);
      e.foto = dataUrl;
      document.querySelector('.photo-upload').innerHTML = `<img src="${dataUrl}"><input type="file" accept="image/*" id="f-foto">`;
      bindFotoInput();
    });
  }
  bindFotoInput();
  if(!editing){
    document.querySelectorAll('#cad-checklist .seg').forEach(seg=>{
      seg.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          seg.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
          btn.classList.add('sel');
          checklistAnswers[seg.dataset.item] = btn.dataset.v;

  document.getElementById('m-save').addEventListener('click', async ()=>{

    if(!editing){
      const responsavel = document.getElementById('f-resp-cad').value.trim();
      if(!responsavel){ showToast("Informe o responsável pela inspeção inicial","err"); return; }
      STATE.extinguishers.push(e);
      const resultado = Object.values(checklistAnswers).includes('NC') ? 'NÃO CONFORME' : 'CONFORME';
      STATE.inspections.push({
        id: uid('INSP'), extinguisherId: e.id,
        date: document.getElementById('f-data-cad').value || todayISO(),
        responsavel, observacoes: document.getElementById('f-obs-cad').value.trim(),
        checklist: CHECK_ITEMS.map((label,i)=>({item:label, valor:checklistAnswers[i]})),
        resultado,
      });
      await persistInspections();
    }
    await persistExtinguishers();
    closeModal();
    showToast(editing?"Extintor atualizado":"Extintor cadastrado");
    renderView();
  });
}

function openInspectionModal(extId, inspectionId=null){
  if(inspectionId){
    if(!requirePermission('editInspections')) return;
  }else if(!requirePermission('createInspections')) return;
  const e = STATE.extinguishers.find(x=>x.id===extId);
  if(!e){ showToast("Extintor não encontrado","err"); return; }

  const existing = inspectionId ? STATE.inspections.find(i=>i.id===inspectionId) : null;
  const answers = {};
  CHECK_ITEMS.forEach((_,i)=>{
    answers[i] = existing?.checklist?.[i]?.valor || 'C';
  });

  openModal(`
    <div class="modal">
      <div class="modal-head">
        <h3>${existing?'Editar inspeção':'Nova inspeção'} · #${escapeHtml(e.numero)} ${escapeHtml(e.localizacao)}</h3>
        <button class="icon-btn" id="m-close">${ICONS.close}</button>
      </div>

      <div class="modal-body">
        <div class="checklist" id="checklist">
          ${CHECK_ITEMS.map((label,i)=>`
            <div class="check-row">
              <span class="num">${i+1}</span>
              <span class="label">${label}</span>
              <div class="seg" data-item="${i}">
                ${['C','NC','NA','S.A'].map(v=>`
                  <button data-v="${v}" class="${answers[i]===v?'sel':''}">${v}</button>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>

        <div class="field" style="margin-top:16px;">
          <label>Responsável pela inspeção</label>
          <input type="text" id="f-resp" placeholder="Nome do inspetor" value="${escapeHtml(existing?.responsavel||'')}">
        </div>

        <div class="field">
          <label>Data da inspeção</label>
          <input type="date" id="f-data" value="${existing?.date || todayISO()}">
        </div>

        <div class="field">
          <label>Observações</label>
          <textarea id="f-obs" placeholder="Ex: mangueira rachada, despressurizado...">${escapeHtml(existing?.observacoes||'')}</textarea>
        </div>
      </div>

      <div class="modal-foot">
        <button class="btn" id="m-cancel">Cancelar</button>
        <button class="btn btn-accent" id="m-save-insp">${existing?'Salvar alterações':'Salvar inspeção'}</button>
      </div>
    </div>
  `);

  document.getElementById('m-close').addEventListener('click', closeModal);
  document.getElementById('m-cancel').addEventListener('click', ()=>{
    if(existing) openExtinguisherDetail(extId);
    else closeModal();
  });

  document.querySelectorAll('#checklist .seg').forEach(seg=>{
    seg.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        seg.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
        answers[seg.dataset.item] = btn.dataset.v;
      });
    });
  });

  document.getElementById('m-save-insp').addEventListener('click', async ()=>{
    const responsavel = document.getElementById('f-resp').value.trim();
    if(!responsavel){ showToast("Informe o responsável pela inspeção","err"); return; }

    const resultado = Object.values(answers).includes('NC') ? 'NÃO CONFORME' : 'CONFORME';
    const updatedData = {
      extinguisherId: extId,
      date: document.getElementById('f-data').value || todayISO(),
      responsavel,
      observacoes: document.getElementById('f-obs').value.trim(),
      checklist: CHECK_ITEMS.map((label,i)=>({item:label, valor:answers[i]})),
      resultado,
    };

    if(existing){
      Object.assign(existing, updatedData);
    }else{
      STATE.inspections.push({id:uid('INSP'), ...updatedData});
    }

    await persistInspections();
    showToast(existing ? "Inspeção atualizada" : `Inspeção registrada — ${resultado}`, resultado==='CONFORME'?'ok':'err');
    openExtinguisherDetail(extId);
    renderView();
  });
}

function renderManualList(q){
  const el = document.getElementById('manual-list');
  if(!el) return;

  q = String(q||'').trim().toLowerCase();
  const list = STATE.extinguishers.filter(e=>{
    const haystack = `${e.numero||''} ${e.localizacao||''} ${e.usina||''} ${e.agente||''}`.toLowerCase();
    return !q || haystack.includes(q);
  });

  if(list.length===0){
    el.innerHTML = `
      <div class="empty" style="padding:38px 14px;">
        <h4>Nenhum extintor encontrado</h4>
        <p>Revise o número, local ou usina informados.</p>
      </div>
    `;
    return;
  }

  function statusClass(status){
    if(status==='ESTOQUE') return 'estoque';
    if(status==='ENVIADO PARA RECARGA') return 'recarga';
    if(status==='DESATIVADO') return 'desativado';
    return 'em-campo';
  }

  el.innerHTML = list.map(e=>{
    const status = e.statusGeral || 'EM CAMPO';
    return `
      <button class="manual-ext-row" data-pick="${e.id}">
        <div class="manual-ext-main">
          <div class="manual-ext-number">#${escapeHtml(e.numero)}</div>
          <div class="manual-ext-usina">${escapeHtml(e.usina||'Usina não informada')}</div>
          <div class="manual-ext-local">${escapeHtml(e.localizacao||'Local não informado')}</div>
        </div>
        <div class="manual-ext-side">
          <div class="manual-ext-meta">${escapeHtml(e.agente||'—')} · ${escapeHtml(e.capacidade||'—')}</div>
          <span class="manual-ext-status ${statusClass(status)}">${escapeHtml(status)}</span>
        </div>
      </button>
    `;
  }).join('');

  el.querySelectorAll('[data-pick]').forEach(b=>{
    b.addEventListener('click', ()=>{
      stopScanner();
      openQuickInspectionPanel(b.dataset.pick);
    });
  });
}

async function startScanner(){
  const video = document.getElementById('scan-video');
  const hint = document.getElementById('scan-hint');
  const button = document.getElementById('btn-start-scan');

  try{
    stopScanner();

    scanStream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:'environment'},
        width:{ideal:1920},
        height:{ideal:1080},
        focusMode:{ideal:'continuous'}
      },
      audio:false
    });

    video.srcObject = scanStream;
    await video.play();

    if(button){
      button.disabled = true;
      button.textContent = "Câmera ativa";
    }

    hint.textContent = "Centralize o QR Code dentro do quadro e aproxime lentamente.";

    let detector = null;
    if('BarcodeDetector' in window){
      try{
        const supported = await BarcodeDetector.getSupportedFormats();
        if(supported.includes('qr_code')){
          detector = new BarcodeDetector({formats:['qr_code']});
        }
      }catch(e){
        console.warn("BarcodeDetector indisponível", e);
      }
    }

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently:true});
    let lastRead = 0;

    async function tick(timestamp=0){
      if(!scanStream) return;
      if(!video.videoWidth || !video.videoHeight){
        scanRAF = requestAnimationFrame(tick);
        return;
      }

      // Limita a leitura para evitar travamentos em celulares.
      if(timestamp - lastRead < 120){
        scanRAF = requestAnimationFrame(tick);
        return;
      }
      lastRead = timestamp;

      let decodedData = null;

      // Primeiro tenta o leitor nativo do navegador, que costuma ser mais preciso.
      if(detector){
        try{
          const codes = await detector.detect(video);
          if(codes && codes.length){
            decodedData = codes[0].rawValue;
          }
        }catch(e){
          console.warn("Falha no leitor nativo", e);
          detector = null;
        }
      }

      // Fallback para jsQR.
      if(!decodedData){
        const maxWidth = 1280;
        const scale = Math.min(1, maxWidth / video.videoWidth);
        canvas.width = Math.round(video.videoWidth * scale);
        canvas.height = Math.round(video.videoHeight * scale);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(
          imgData.data,
          canvas.width,
          canvas.height,
          {inversionAttempts:'attemptBoth'}
        );

        if(code && code.data) decodedData = code.data;
      }

      if(decodedData){
        const extId = extinguisherIdFromQrData(decodedData);
        const ext = STATE.extinguishers.find(e=>e.id===extId);

        if(ext){
          if(navigator.vibrate) navigator.vibrate(120);
          stopScanner();
          openQuickInspectionPanel(ext.id);
          return;
        }

        hint.textContent = "QR Code reconhecido, mas não corresponde a um extintor cadastrado.";
      }

      scanRAF = requestAnimationFrame(tick);
    }

    scanRAF = requestAnimationFrame(tick);
  }catch(err){
    console.error("Scanner error", err);
    hint.textContent = "Não foi possível acessar a câmera. Verifique a permissão do navegador.";
    showToast("Câmera indisponível","err");

    if(button){
      button.disabled = false;
      button.innerHTML = `${ICONS.camera}Ativar câmera`;
    }
  }
}
function stopScanner(){
  if(scanRAF){
    cancelAnimationFrame(scanRAF);
    scanRAF = null;
  }
  if(scanStream){
    scanStream.getTracks().forEach(t=>t.stop());
    scanStream = null;
  }

  const video = document.getElementById('scan-video');
  if(video) video.srcObject = null;

  const button = document.getElementById('btn-start-scan');
  if(button){
    button.disabled = false;
    button.innerHTML = `${ICONS.camera}Ativar câmera`;
  }
}

function openInspectionModal(extId, inspectionId=null){
  if(inspectionId){
    if(!requirePermission('editInspections')) return;
  }else if(!requirePermission('createInspections')) return;
  const e = STATE.extinguishers.find(x=>x.id===extId);
  if(!e){ showToast("Extintor não encontrado","err"); return; }

  const existing = inspectionId ? STATE.inspections.find(i=>i.id===inspectionId) : null;
  const answers = {};
  CHECK_ITEMS.forEach((_,i)=>{
    answers[i] = existing?.checklist?.[i]?.valor || 'C';
  });

  openModal(`
    <div class="modal">
      <div class="modal-head">
        <h3>${existing?'Editar inspeção':'Nova inspeção'} · #${escapeHtml(e.numero)} ${escapeHtml(e.localizacao)}</h3>
        <button class="icon-btn" id="m-close">${ICONS.close}</button>
      </div>

      <div class="modal-body">
        <div class="checklist" id="checklist">
          ${CHECK_ITEMS.map((label,i)=>`
            <div class="check-row">
              <span class="num">${i+1}</span>
              <span class="label">${label}</span>
              <div class="seg" data-item="${i}">
                ${['C','NC','NA','S.A'].map(v=>`
                  <button data-v="${v}" class="${answers[i]===v?'sel':''}">${v}</button>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>

        <div class="field" style="margin-top:16px;">
          <label>Responsável pela inspeção</label>
          <input type="text" id="f-resp" placeholder="Nome do inspetor" value="${escapeHtml(existing?.responsavel||'')}">
        </div>

        <div class="field">
          <label>Data da inspeção</label>
          <input type="date" id="f-data" value="${existing?.date || todayISO()}">
        </div>

        <div class="field">
          <label>Observações</label>
          <textarea id="f-obs" placeholder="Ex: mangueira rachada, despressurizado...">${escapeHtml(existing?.observacoes||'')}</textarea>
        </div>
      </div>

      <div class="modal-foot">
        <button class="btn" id="m-cancel">Cancelar</button>
        <button class="btn btn-accent" id="m-save-insp">${existing?'Salvar alterações':'Salvar inspeção'}</button>
      </div>
    </div>
  `);

  document.getElementById('m-close').addEventListener('click', closeModal);
  document.getElementById('m-cancel').addEventListener('click', ()=>{
    if(existing) openExtinguisherDetail(extId);
    else closeModal();
  });

  document.querySelectorAll('#checklist .seg').forEach(seg=>{
    seg.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        seg.querySelectorAll('button').forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
        answers[seg.dataset.item] = btn.dataset.v;
      });
    });
  });

  document.getElementById('m-save-insp').addEventListener('click', async ()=>{
    const responsavel = document.getElementById('f-resp').value.trim();
    if(!responsavel){ showToast("Informe o responsável pela inspeção","err"); return; }

    const resultado = Object.values(answers).includes('NC') ? 'NÃO CONFORME' : 'CONFORME';
    const updatedData = {
      extinguisherId: extId,
      date: document.getElementById('f-data').value || todayISO(),
      responsavel,
      observacoes: document.getElementById('f-obs').value.trim(),
      checklist: CHECK_ITEMS.map((label,i)=>({item:label, valor:answers[i]})),
      resultado,
    };

    if(existing){
      Object.assign(existing, updatedData);
    }else{
      STATE.inspections.push({id:uid('INSP'), ...updatedData});
    }

    await persistInspections();
    showToast(existing ? "Inspeção atualizada" : `Inspeção registrada — ${resultado}`, resultado==='CONFORME'?'ok':'err');
    openExtinguisherDetail(extId);
    renderView();
  });
}
