<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reparar Gestão de Extintores</title>
<style>
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#12161b;color:#eef2f6;font-family:Arial,sans-serif;padding:24px;text-align:center}
.card{max-width:440px;background:#1b222a;border:1px solid #303a45;border-radius:16px;padding:28px}
button{border:0;border-radius:9px;padding:13px 18px;background:#e0432a;color:white;font-weight:700;cursor:pointer}
p{color:#aeb8c3;line-height:1.55}
</style>
</head>
<body>
<div class="card">
  <h2>Reparar aplicativo</h2>
  <p>Esta ação remove apenas o cache e o Service Worker. Seus usuários, extintores, inspeções e dados do Firebase não serão apagados.</p>
  <button id="repair">Limpar cache e abrir sistema</button>
</div>
<script>
document.getElementById('repair').addEventListener('click',async()=>{
  const button=document.getElementById('repair');
  button.disabled=true;
  button.textContent='Limpando...';

  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(reg=>reg.unregister()));
    }

    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(key=>caches.delete(key)));
    }
  }finally{
    location.href='./?atualizado='+Date.now();
  }
});
</script>
</body>
</html>
